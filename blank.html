  /* Custom 8-bit cursor */

/* Click particles */
.particle {
  position: fixed;
  width: 100px; /* bigger for impact */
  height: 100px;
  /* background: #ff00ff; */
  background: #ffffff;
  /* image-rendering: pixelated; */
  pointer-events: none;

  /* filter: invert(1) brightness(2); */
}

.cursor {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 99999;
  width: var(--cursor-size, 24px);
  height: var(--cursor-size, 24px);
  background-image: var(--cursor-icon);
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
  image-rendering: pixelated;
  transform: translate(-100px, -100px);
  will-change: transform, background-image;
}

/* Ripple effect */
.ripple {
  position: absolute;
  border: 2px solid #000000;
  border-radius: 50%; /* makes it a circle */
  width: 20px;
  height: 20px;
  pointer-events: none;
  opacity: 0.6;
  z-index: 99999;
}


.card-stack {
  width: 20vw;
  height: 20vw;
  position: relative;
  display: grid;
  place-content: center;
  user-select: none;
  touch-action: none;
  transform-style: preserve-3d;
}

:root {
  --card-perspective: 1000px;
  --card-z-offset: 32px;
  --card-y-offset: -1vw;
  --card-max-z-index: 100;
  --card-swap-duration: 0.3s;
  --swipe-y: 0px;
  --swipe-rotate-x: 0deg;
}

.card {
  cursor: grab;
  /* background-color: #eee; */
  display: grid;
  place-content: center;
  position: absolute;
  width: 100%;
  height: 100%;
  border: 1px solid #99a;
  border-radius: 0.3rem;
  z-index: calc(var(--card-max-z-index) - var(--i));
  transform: perspective(var(--card-perspective))
    translateZ(calc(-1 * var(--card-z-offset) * var(--i)))
    translateY(calc(var(--card-y-offset) * var(--i) + var(--swipe-y, 0px)))
    rotateX(var(--swipe-rotate-x, 0deg));
  transition: transform var(--card-swap-duration) ease, opacity var(--card-swap-duration) ease;
  will-change: transform;
  /* box-shadow: 0 -4px 8px rgba(0, 0, 0, 0.15); */
  border: 2px solid rgba(0, 0, 0,1);
}

.card:active {
  cursor: grabbing;
}

.card img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover; /* makes it fill the card without stretching */
  pointer-events: none; /* prevents blocking clicks/drag */
}

/* background image (bottom layer) */
.card-bg {
  mix-blend-mode: normal;
  z-index: 1;
  filter: url("#pixelateStr3") saturate(1);
}

/* noise texture overlay */
.card-noise {
  --noise: url("https://music.manz.dev/images/noise.png");

  background: #0c0c0c;
  background-image: var(--shine), var(--noise);
  background-blend-mode: lighten, soft-light;
  opacity: 0.1; /* tweak if needed */
  z-index: 2;
  width: 100%;
  height: 100%;
}

/* plastic texture overlay */

    position: absolute;
  /* mix-blend-mode: exclusion; */

.shadow {
  position: absolute;
  bottom: -10vw;         /* slightly below card */
  left: 50%;           /* center horizontally */
  transform: translateX(-50%) rotateX(90deg); 
  width: 90%;          /* relative to card width */

  background: rgba(0,0,0,.1);

/* Info Panels */
.info-panels {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  perspective: 1000px;
  overflow: hidden;
  /* pointer-events: none; */
}

.info {
  position: absolute;
  display: flex; /* keep it flex for alignment */
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  transform: translateY(0%); /* slide back up when hiding */
  transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease;
	transform-style: preserve-3d;
  overflow: visible;
}

.info.visible {
	transform-style: preserve-3d;
  overflow: visible;

  opacity: 1;
  transform: translateY(0); /* slide to normal position */
}

.info.hiding {
		transform-style: preserve-3d;
  overflow: visible;
  opacity: 0;
  transform: translateY(-200%); /* slide back up when hiding */
}

.main-container {
  position: relative;   /* establish positioning context */

.right-panel {

  color: #000;
}

.right-panel {
	transform: translateX(0vw) translateY(0vw);

  mix-blend-mode: overlay;
  position: absolute;
  z-index: 0;

  content: '';
  z-index: -10;
  width: 100%;
  height: 100%;

  position: absolute;

  position: relative;
  font-family: 'Press Start 2P', cursive;
  font-size: 3.4vw; /* Adjust the value (e.g., 4.3vw) until it fits on one line */
  white-space: nowrap; /* Prevents the text from wrapping to a new line */
  font-weight: 700;
  text-align: center;
  top: -50%;
  width: 100%;
  height: 4.4vw;
  text-transform: uppercase;
  letter-spacing: 1px;
  /* text-shadow: 0 3px 6px rgba(0,0,0,0.25); */
  animation: title-drop 2s ease-out;
  animation-delay: 2s; /* wait for .info.visible animation to finish */
	animation-fill-mode: forwards; /* keep final state */
}

@keyframes title-drop {
  0% { top: -15% }
  100% { top: 1% }
} 

.title-highlight {
  position: relative;
  width: 0%;
  height: 4vw;
  background-color: var(--secondary-ac);
  opacity: 0.35;
  top: 0%;
  left: -2.5%;
  transform: translateX(0%) translateY(-100%);
  z-index: -10;
  animation: title-highlight 1s ease-out;
  animation-delay: 4s; /* wait for .info.visible animation to finish */
	animation-fill-mode: forwards; /* keep final state */
}

@keyframes title-highlight {
  0% { width: 0% }
  100% { width: 101% }
} 

/* Subtitle */
.subtitle {
  position: relative;
  font-family: 'Press Start 2P', cursive;
  font-size: 0.5vw;
  font-weight: 300;
  opacity: 0.85;
  width: 0;
  text-align: left;
  left: -50%;
  padding: 1rem 0rem 1rem 0rem;
  opacity: .75;
  animation: descr-anim 1s ease-out;
  animation-delay: 4.25s; /* wait for .info.visible animation to finish */
	animation-fill-mode: forwards; /* keep final state */
}

@keyframes subtitle-anim {
  0% { width: 0%; left: -50%;}
  100% { width: 100%; left: 0; }
} 

@font-face {
  font-family: 'MyCustomFont';
  src: url('fonts/MyCustomFont.ttf') format('truetype');

}

/* Description text */

  position: relative;
  font-family: 'Press Start 2P', cursive;

  0% { width: 0%; left: -8vw;}

<script>
// List of particle images
const particleImgs = [
  "music_note_1.png",
  "music_note_2.png",
  "music_note_3.png"
];

// Scale percent variable to control particle size

document.addEventListener("mousemove", e => {
  cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
});

document.addEventListener("click", e => {
  const x = e.clientX;
  const y = e.clientY;

  const numParticles = 5; 
  const minRadius = 35;  
  const maxRadius = 200;
  const numWaves = 3;
  const waveDelay = 50;

  for (let w = 0; w < numWaves; w++) {
    setTimeout(() => {
      for (let i = 0; i < numParticles; i++) {
        const particle = document.createElement("img");

        // Pick random image
        particle.src = particleImgs[Math.floor(Math.random() * particleImgs.length)];
        particle.className = "particle";

        // Ensure transparency
        particle.style.background = "transparent";
        particle.style.position = "fixed";
        particle.style.pointerEvents = "none";
        particle.style.zIndex = "999";
        particle.style.imageRendering = "pixelated";

        // Random size with scalePercent
        const scalePercent = 0.2; // 1 = original, 0.5 = half size, 2 = double size
const baseSize = 100; // original size of your image
const size = baseSize * scalePercent * (Math.random() * 0.5 + 0.75); // slight random variation
particle.style.width = `${size}px`;
particle.style.height = `${size}px`;


        screen.appendChild(particle);

        // Random angle for spread
        const angle = Math.random() * 2 * Math.PI + w * 0.15;
        const distance = minRadius + Math.random() * (maxRadius - minRadius);
        const destX = Math.cos(angle) * distance;
        const destY = Math.sin(angle) * distance;

        particle.style.left = `${x}px`;
        particle.style.top = `${y}px`;

        // Animate particle
        const anim = particle.animate([
  { transform: `translate(0,0)`, opacity: 1 },
  { transform: `translate(${destX}px, ${destY}px)`, opacity: 0 }
], {
  duration: 1000 + Math.random() * 400,
  easing: "cubic-bezier(0.25,1,0.5,1)"
});

        anim.onfinish = () => particle.remove();
      }
    }, w * waveDelay);
  }

  // --- Multiple ripples
  const numRipples = 5;
  for (let i = 0; i < numRipples; i++) {
    const ripple = document.createElement("div");
    ripple.className = "ripple";
    ripple.style.left = `${x - 10}px`;
    ripple.style.top = `${y - 10}px`;
    screen.appendChild(ripple);

    const scale = 3 + i * 2;
    const duration = 500 + i * 100;

    const anim = ripple.animate([
      { transform: "scale(0.5)", opacity: 0.1 },
      { transform: `scale(${scale})`, opacity: 0 }
    ], {
      duration: duration,
      easing: "ease-out"
    });

    anim.onfinish = () => ripple.remove();
  }

  // --- Screen shake
  const intensity = 5;
  const keyframes = [
    { transform: "translate(0,0)" },
    { transform: `translate(${Math.random()*intensity-intensity/2}px,${Math.random()*intensity-intensity/2}px)` },
    { transform: `translate(${Math.random()*intensity-intensity/2}px,${Math.random()*intensity-intensity/2}px)` },
    { transform: "translate(0,0)" }
  ];
  screen.animate(keyframes, { duration: 200, easing: "ease-out" });
});

const clickSFX = [
  new Audio('click1.mp3'),
  new Audio('click2.mp3'),
  new Audio('click3.mp3')
];

document.addEventListener("click", e => {
  // Play random click sound
  const sound = clickSFX[Math.floor(Math.random() * clickSFX.length)];
  sound.currentTime = 0; // restart in case it's still playing
  sound.volume = .25;
  sound.play();

  const x = e.clientX;
  const y = e.clientY;

  // ... your particle & ripple code here ...
});


const data = [
  { text: "-", img: "images/BLANK_Promo1.png" },
  { text: '-', img: "images/BLANK_Promo1.png" },
  { text: "-", img: "images/BLANK_Promo1.png" },
  { text: "-", img: "images/BLANK_Promo1.png" }
];

const lyricsEl = document.getElementById("lyrics");
const container = document.getElementById("lyricsContainer");
const image = document.getElementById("mainImage");

let currentIndex = 0;
let autoScrollEnabled = true;
let userInteracting = false;
let autoScrollTimer;

// CREATE LINES
data.forEach((item, i) => {
  const div = document.createElement("div");
  div.className = "line";
  div.innerText = item.text;
  div.dataset.index = i;

  // CLICK TO JUMP
  div.addEventListener("click", () => {
    userTakeover();
    currentIndex = i;
    setActive(currentIndex, true);
  });

  lyricsEl.appendChild(div);
});

const lines = document.querySelectorAll(".line");

// SET ACTIVE
container.addEventListener("scroll", () => {
  userTakeover(); // your existing function
  updateLyricStyles(); // NEW: update blur/opacity dynamically
});

// Also call it whenever you set active lyric programmatically
function setActive(index, instant = false) {
  lines.forEach(line => line.classList.remove("active"));
  lines[index].classList.add("active");

  // Image update
  image.style.opacity = 0;
  setTimeout(() => {
    image.src = data[index].img;
    image.style.opacity = 1;
  }, 200);

  const line = lines[index];
  const offset = line.offsetTop - container.clientHeight / 2 + line.clientHeight / 2;

  container.scrollTo({
    top: offset,
    behavior: instant ? "auto" : "smooth"
  });

  updateLyricStyles(); // NEW: update styles after scroll
}

// AUTO SCROLL LOOP
function startAutoScroll() {
  autoScrollTimer = setInterval(() => {
    if (!autoScrollEnabled || userInteracting) return;

    currentIndex++;

    //  LOOP BACK TO START (FIX)
    if (currentIndex >= data.length) {
      currentIndex = 0;
    }

    setActive(currentIndex);
  }, 10000);
}

// USER TAKEOVER (IMPORTANT FIX)
function userTakeover() {
  userInteracting = true;
  autoScrollEnabled = false;

  clearTimeout(resumeTimer);
  resumeTimer = setTimeout(() => {
    userInteracting = false;
    autoScrollEnabled = true;
  }, 2000); // resume after inactivity
}

let resumeTimer;

// SCROLL DETECTION (IMPROVED)
let isScrolling = false;

container.addEventListener("wheel", (e) => {
  e.preventDefault();
  if (isScrolling) return;
  
  isScrolling = true;
  userTakeover();
  
  if (e.deltaY > 0) {
    currentIndex = Math.min(currentIndex + 1, data.length - 1);
  } else {
    currentIndex = Math.max(currentIndex - 1, 0);
  }
  
  setActive(currentIndex);
  
  setTimeout(() => { isScrolling = false; }, 10); // cooldown matches scroll animation
}, { passive: false });

["touchstart", "mousedown"].forEach(event => {
  container.addEventListener(event, userTakeover);
});

// INIT
setActive(0, true);
startAutoScroll();

function updateLyricStyles() {
  lines.forEach((line, i) => {
    const distance = Math.abs(i - currentIndex); // distance in lyric steps

    if (i === currentIndex) {
      line.style.opacity = 1;
      line.style.filter = "none";
    } else {
      const opacity = Math.max(0, 0.33 - (distance * 0.10)); // fades to 0 by step 4
      const blur = Math.min(5, distance * 5);
      line.style.opacity = opacity;
      line.style.filter = `blur(${blur}px)`;
    }
  });
}

</script>
